<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <rect width="400" height="300" rx="12" fill="#1C1C2E"/>
  <!-- Friction scale bars -->
  <rect x="60" y="40" width="280" height="8" rx="4" fill="#2A2A40"/>
  <rect x="60" y="40" width="280" height="8" rx="4" fill="url(#friction)"/>
  <!-- Scale markers -->
  <circle cx="60" cy="44" r="6" fill="#06B6D4"/>
  <circle cx="116" cy="44" r="6" fill="#22D3EE"/>
  <circle cx="172" cy="44" r="6" fill="#34D399"/>
  <circle cx="228" cy="44" r="6" fill="#FBBF24"/>
  <circle cx="284" cy="44" r="6" fill="#F97316"/>
  <circle cx="340" cy="44" r="6" fill="#EF4444"/>
  <!-- Labels -->
  <text x="60" y="68" fill="#94A3B8" font-family="system-ui" font-size="9" text-anchor="middle">Low</text>
  <text x="340" y="68" fill="#94A3B8" font-family="system-ui" font-size="9" text-anchor="middle">High</text>
  <!-- UI Component cards -->
  <!-- Toast -->
  <rect x="40" y="90" width="100" height="60" rx="8" fill="#2A2A40" stroke="#06B6D4" stroke-width="1.5"/>
  <rect x="50" y="100" width="40" height="4" rx="2" fill="#06B6D4"/>
  <rect x="50" y="110" width="80" height="3" rx="1.5" fill="#4A4A60"/>
  <rect x="50" y="118" width="60" height="3" rx="1.5" fill="#4A4A60"/>
  <text x="90" y="142" fill="#06B6D4" font-family="system-ui" font-size="8" text-anchor="middle">Toast</text>
  <!-- Dialog -->
  <rect x="150" y="90" width="100" height="60" rx="8" fill="#2A2A40" stroke="#FBBF24" stroke-width="1.5"/>
  <rect x="160" y="98" width="80" height="6" rx="3" fill="#FBBF24" opacity="0.3"/>
  <rect x="160" y="110" width="80" height="3" rx="1.5" fill="#4A4A60"/>
  <rect x="160" y="118" width="60" height="3" rx="1.5" fill="#4A4A60"/>
  <rect x="170" y="130" width="24" height="12" rx="4" fill="#FBBF24"/>
  <rect x="200" y="130" width="24" height="12" rx="4" fill="#3A3A50"/>
  <text x="200" y="142" fill="#FBBF24" font-family="system-ui" font-size="8" text-anchor="middle" dy="15">Dialog</text>
  <!-- Push -->
  <rect x="260" y="90" width="100" height="60" rx="8" fill="#2A2A40" stroke="#EF4444" stroke-width="1.5"/>
  <circle cx="275" cy="105" r="8" fill="#EF4444" opacity="0.3"/>
  <rect x="290" y="100" width="60" height="4" rx="2" fill="#EF4444"/>
  <rect x="290" y="110" width="50" height="3" rx="1.5" fill="#4A4A60"/>
  <circle cx="350" cy="105" r="4" fill="#EF4444"/>
  <text x="310" y="142" fill="#EF4444" font-family="system-ui" font-size="8" text-anchor="middle">Push</text>
  <!-- Bottom row -->
  <!-- Tooltip -->
  <rect x="40" y="175" width="100" height="50" rx="8" fill="#2A2A40" stroke="#34D399" stroke-width="1.5"/>
  <circle cx="90" cy="195" r="10" fill="#34D399" opacity="0.2"/>
  <text x="90" y="199" fill="#34D399" font-family="system-ui" font-size="12" text-anchor="middle" font-weight="bold">?</text>
  <text x="90" y="218" fill="#34D399" font-family="system-ui" font-size="8" text-anchor="middle">Tooltip</text>
  <!-- Banner -->
  <rect x="150" y="175" width="100" height="50" rx="8" fill="#2A2A40" stroke="#F97316" stroke-width="1.5"/>
  <rect x="160" y="185" width="80" height="20" rx="4" fill="#F97316" opacity="0.15"/>
  <rect x="165" y="190" width="50" height="3" rx="1.5" fill="#F97316"/>
  <rect x="165" y="197" width="35" height="3" rx="1.5" fill="#F97316" opacity="0.5"/>
  <text x="200" y="218" fill="#F97316" font-family="system-ui" font-size="8" text-anchor="middle">Banner</text>
  <!-- Email -->
  <rect x="260" y="175" width="100" height="50" rx="8" fill="#2A2A40" stroke="#8B5CF6" stroke-width="1.5"/>
  <path d="M295 188 L310 198 L325 188" stroke="#8B5CF6" stroke-width="2" fill="none" stroke-linecap="round"/>
  <rect x="290" y="186" width="40" height="24" rx="3" stroke="#8B5CF6" stroke-width="1.5" fill="none"/>
  <text x="310" y="218" fill="#8B5CF6" font-family="system-ui" font-size="8" text-anchor="middle">Email</text>
  <!-- Title -->
  <text x="200" y="262" fill="white" font-family="system-ui" font-size="13" text-anchor="middle" font-weight="600">UI Components Friction Scale</text>
  <text x="200" y="280" fill="#94A3B8" font-family="system-ui" font-size="10" text-anchor="middle">Choosing the right component</text>
  <defs>
    <linearGradient id="friction" x1="60" y1="44" x2="340" y2="44" gradientUnits="userSpaceOnUse">
      <stop stop-color="#06B6D4"/>
      <stop offset="0.5" stop-color="#FBBF24"/>
      <stop offset="1" stop-color="#EF4444"/>
    </linearGradient>
  </defs>
</svg>